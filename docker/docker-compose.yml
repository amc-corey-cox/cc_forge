# CC Forge Infrastructure
# Forgejo (local git hosting) + Ollama proxies for agent containers

services:
  forgejo:
    image: codeberg.org/forgejo/forgejo:14
    container_name: forge-forgejo
    restart: unless-stopped
    environment:
      # Enable Forgejo Actions and resolve `uses:` actions (checkout, setup-uv) from github.com.
      FORGEJO__actions__ENABLED: "true"
      FORGEJO__actions__DEFAULT_ACTIONS_URL: "github"
      # Public address Forgejo builds links/redirects from. Defaults to localhost for a
      # single-host setup; set FORGE_FORGEJO_ROOT_URL/FORGE_FORGEJO_DOMAIN in docker/.env
      # (gitignored) when reaching Forgejo from other devices, or links point to localhost.
      FORGEJO__server__ROOT_URL: "${FORGE_FORGEJO_ROOT_URL:-http://localhost:3000/}"
      FORGEJO__server__DOMAIN: "${FORGE_FORGEJO_DOMAIN:-localhost}"
      FORGEJO__server__SSH_DOMAIN: "${FORGE_FORGEJO_DOMAIN:-localhost}"
    volumes:
      - forgejo-data:/data
    ports:
      - "3000:3000"
      - "222:22"
    networks:
      - forge-network

  ollama-proxy:
    image: alpine/socat:latest
    container_name: forge-ollama-proxy
    restart: unless-stopped
    command: TCP-LISTEN:11434,fork,reuseaddr TCP:host.docker.internal:11434,keepalive,keepidle=60,keepintvl=30,keepcnt=5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - forge-network

  ollama-gpu-proxy:
    image: alpine/socat:latest
    container_name: forge-ollama-gpu-proxy
    restart: unless-stopped
    command: TCP-LISTEN:11435,fork,reuseaddr TCP:host.docker.internal:11435,keepalive,keepidle=60,keepintvl=30,keepcnt=5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - forge-network

  runner:
    image: code.forgejo.org/forgejo/runner:6.3.1
    container_name: forge-runner
    restart: unless-stopped
    # Join the host's docker group so the runner can use the mounted docker.sock.
    # Must match `getent group docker` on the host; setup automation (#98) can auto-detect.
    group_add:
      - "${FORGE_DOCKER_GID:-983}"
    depends_on:
      - forgejo
    volumes:
      - runner-data:/data
      # Host Docker socket: the runner spawns job containers via the host daemon.
      # Deliberate, accepted trade-off — see "CI Runner" in README.md.
      - /var/run/docker.sock:/var/run/docker.sock
      - ./forgejo-runner/config.yaml:/etc/forgejo-runner/config.yaml:ro
    networks:
      - forge-network
    # The daemon needs a registered /data/.runner file; register once before `up`
    # (server step — see README.md). Working dir is /data so it finds .runner.
    working_dir: /data
    command: forgejo-runner daemon --config /etc/forgejo-runner/config.yaml

networks:
  forge-network:
    name: forge-network
    driver: bridge

volumes:
  forgejo-data:
  runner-data:
